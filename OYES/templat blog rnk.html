/* Tombol */
.btn{
position:relative;
display:inline-block;
padding:18px 45px;
border-radius:50px;
background:linear-gradient(45deg,#ff0000,#ff5500,#ff0000);
color:#fff;
font-size:22px;
font-weight:bold;
text-decoration:none;
overflow:hidden;
box-shadow:0 0 15px red,0 0 35px #ff3300;
animation:pulse 1.5s infinite;
}

.btn:before{
content:"";
position:absolute;
top:0;
left:-100%;
width:50%;
height:100%;
background:rgba(255,255,255,.7);
transform:skewX(-25deg);
animation:shine 2s infinite;
}

.btn:active{
transform:scale(.95);
}

@keyframes pulse{
0%{box-shadow:0 0 10px red;}
50%{box-shadow:0 0 35px #ff3300,0 0 60px red;}
100%{box-shadow:0 0 10px red;}
}

@keyframes shine{
100%{left:160%;}
}

/* Love */
.hearts{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
overflow:hidden;

}

.heart{
position:absolute;
bottom:-40px;
color:#ff4d6d;
animation:fly linear forwards;
text-shadow:0 0 10px #ff4d6d;
}

@keyframes fly{
0%{
transform:translateY(0) scale(.5) rotate(0deg);
opacity:0;
}
15%{
opacity:1;
}
100%{
transform:translateY(-120vh) scale(1.5) rotate(360deg);
opacity:0;
}
}
